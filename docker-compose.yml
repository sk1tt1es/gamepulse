services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gamepulse
      POSTGRES_PASSWORD: gamepulse
      POSTGRES_DB: gamepulse
    volumes:
      - gamepulse_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamepulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://gamepulse:gamepulse@postgres:5432/gamepulse?sslmode=disable
      ENABLE_WORKERS: "true"
      LIVE_TRACKER_INTERVAL: 8s
      NEWS_AGGREGATOR_INTERVAL: 5m
      DIGEST_INTERVAL: 1m
      # Provider creds — leave empty to use bundled mocks.
      SPORTS_API_KEY: ${SPORTS_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  gamepulse_pg:
