# fly.toml app configuration file generated for gamepulse-backend on 2026-05-04T21:58:29-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gamepulse-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DIGEST_INTERVAL = '5m'
  ENABLE_WORKERS = 'true'
  FINISHED_GAME_RETENTION = '24h'
  HTTP_ADDR = ':8080'
  INITIAL_NEWS_DELAY = '5m'
  LIVE_TRACKER_INTERVAL = '10s'
  # 6h is the spec target — news is summarised at SEND time so polling
  # more often just spends NewsAPI quota for no SMS-side benefit.
  NEWS_AGGREGATOR_INTERVAL = '6h'
  NEWS_ARTICLE_RETENTION = '1440h'
  SPORTS_PROVIDER = 'espn'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
